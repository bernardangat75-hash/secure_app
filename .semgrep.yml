rules:
  - id: python-no-eval
    patterns:
      - pattern: eval(...)
    message: "Avoid eval() due to security risk"
    severity: ERROR
    languages: [python]

  - id: flask-debug
    patterns:
      - pattern: app.run(debug=True)
    message: "Do not use debug=True in production"
    severity: WARNING
    languages: [python]
